<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dylet</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--card:rgba(14,14,14,0.9);--border:rgba(255,255,255,0.08);--border-h:rgba(255,255,255,0.18);--muted:rgba(240,240,240,0.35);--muted2:rgba(240,240,240,0.55);}
html,body{height:100%;overflow-x:hidden}
body{background:#000;color:#f0f0f0;font-family:system-ui,sans-serif;cursor:default;}

.video-bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.video-bg video{width:100%;height:100%;object-fit:cover;filter:grayscale(100%) brightness(0.35) contrast(1.1);}
.video-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.7) 60%,rgba(0,0,0,0.97) 100%);}

.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 60px;gap:14px;}

/* GUN ANIMATION */
.gun-wrap{width:100%;max-width:380px;display:flex;align-items:center;justify-content:center;margin-bottom:-4px;}
.gun-img{width:160px;height:auto;animation:gunFloat 3s ease-in-out infinite,gunSpin 0.08s steps(1) infinite;}

@keyframes gunFloat{
  0%,100%{transform:translateY(0px) rotate(-15deg);}
  50%{transform:translateY(-10px) rotate(-15deg);}
}
@keyframes gunShake{
  0%,100%{transform:translateY(0px) rotate(-15deg);}
  25%{transform:translateY(-2px) rotate(-13deg);}
  75%{transform:translateY(2px) rotate(-17deg);}
}

.gun-img:hover{animation:gunShake 0.1s ease-in-out infinite;}

/* CARD */
.card{width:100%;max-width:380px;background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.9);}
.card-banner{height:76px;background:linear-gradient(135deg,#0a0a0a,#161616,#0a0a0a);position:relative;overflow:hidden;}
.card-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,0.01) 12px,rgba(255,255,255,0.01) 13px);}
.card-banner-pill{position:absolute;top:10px;right:12px;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);border:1px solid rgba(255,255,255,0.07);padding:3px 10px;border-radius:100px;}
.card-header{padding:0 16px;margin-top:-30px;display:flex;align-items:flex-end;justify-content:space-between;}
.avatar-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
.avatar-img{width:64px;height:64px;border-radius:50%;border:3px solid #0a0a0a;object-fit:cover;display:block;}
.status-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#333;border-radius:50%;border:2px solid #0a0a0a;}
.card-body{padding:10px 16px 16px;}
.card-name{font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-0.01em;}
.card-tag{font-size:0.72rem;color:var(--muted);margin-top:1px;margin-bottom:10px;}
.divider{height:1px;background:var(--border);margin:10px 0;}
.s-label{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.about{font-size:0.82rem;color:var(--muted2);line-height:1.5;}
.location{display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--muted2);margin-top:7px;}
.location svg{opacity:0.4;flex-shrink:0;}

/* PLAYER */
.player{width:100%;max-width:380px;background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,0.7);}
.player-top{display:flex;align-items:center;gap:11px;}
.player-art{width:46px;height:46px;border-radius:8px;background:#111;border:1px solid var(--border);flex-shrink:0;overflow:hidden;}
.player-art img{width:100%;height:100%;object-fit:cover;display:block;}
.player-info{flex:1;min-width:0;}
.player-title{font-size:0.84rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-artist{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.player-badge{font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:3px 9px;border-radius:100px;flex-shrink:0;}
.prog-area{margin-top:13px;}
.prog-track{width:100%;height:2px;background:rgba(255,255,255,0.09);border-radius:2px;cursor:pointer;}
.prog-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .3s linear;}
.times{display:flex;justify-content:space-between;font-size:0.63rem;color:var(--muted);margin-top:5px;}
.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:13px;}
.ctrl{background:none;border:none;cursor:pointer;color:var(--muted2);transition:color .15s,transform .12s;display:flex;align-items:center;padding:0;}
.ctrl:hover{color:#fff;transform:scale(1.12);}
.ctrl-play{width:38px;height:38px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .12s;flex-shrink:0;}
.ctrl-play:hover{transform:scale(1.07);}

/* SOCIALS */
.socials{width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;}
.soc{display:flex;align-items:center;gap:11px;padding:12px 15px;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--muted2);transition:border-color .2s,color .2s,transform .15s;}
.soc:hover{border-color:var(--border-h);color:#fff;transform:translateX(4px);}
.soc-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.soc-text{flex:1;}
.soc-name{font-size:0.78rem;font-weight:500;}
.soc-sub{font-size:0.66rem;color:var(--muted);margin-top:1px;}
.soc-arr{opacity:0.2;transition:opacity .2s,transform .15s;flex-shrink:0;}
.soc:hover .soc-arr{opacity:0.5;transform:translateX(3px);}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
</style>
</head>

<script>
const audio=document.getElementById('audio');
const fill=document.getElementById('fill'),tNow=document.getElementById('tNow'),tDur=document.getElementById('tDur'),badge=document.getElementById('badge');
const iPlay=document.getElementById('iPlay'),iPause=document.getElementById('iPause');
let playing=false;
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration);});
audio.addEventListener('timeupdate',()=>{if(!audio.duration)return;fill.style.width=(audio.currentTime/audio.duration*100)+'%';tNow.textContent=fmt(audio.currentTime);});
document.getElementById('btnPlay').addEventListener('click',()=>{
  if(playing){audio.pause();playing=false;iPlay.style.display='';iPause.style.display='none';badge.textContent='Paused';}
  else{audio.play().catch(()=>{});playing=true;iPlay.style.display='none';iPause.style.display='';badge.textContent='Playing';}
});
document.getElementById('track').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();if(audio.duration)audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;});
document.getElementById('btnPrev').addEventListener('click',()=>{audio.currentTime=0;});
document.getElementById('btnNext').addEventListener('click',()=>{audio.currentTime=0;});
document.getElementById('btnS').addEventListener('click',function(){this.style.color=this.style.color?'':'rgba(255,255,255,0.9)';});
// repeat always on by default (loop attribute set)
const btnR=document.getElementById('btnR');
btnR.style.color='rgba(255,255,255,0.9)';
btnR.addEventListener('click',function(){
  audio.loop=!audio.loop;
  this.style.color=audio.loop?'rgba(255,255,255,0.9)':'';
  badge.textContent=audio.loop?'Loop ON':'Loop OFF';
  setTimeout(()=>{badge.textContent=playing?'Playing':'Paused';},1200);
});
</script>
